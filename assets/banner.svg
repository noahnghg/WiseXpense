<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="100%" height="250">
    <defs>
        <!-- Background Gradient: Deep Royal Blue -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0B132B" />
            <stop offset="100%" stop-color="#1C2541" />
        </linearGradient>

        <!-- Gold Coin Gradient -->
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFE066" />
            <stop offset="40%" stop-color="#F5B700" />
            <stop offset="50%" stop-color="#FFD166" />
            <stop offset="90%" stop-color="#B8860B" />
            <stop offset="100%" stop-color="#8B6508" />
        </linearGradient>
        
        <!-- Shine Gradient -->
        <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)" />
            <stop offset="20%" stop-color="rgba(255,255,255,0.7)" />
            <stop offset="40%" stop-color="rgba(255,255,255,0)" />
        </linearGradient>

        <!-- Inner shadow/emboss filter for coin effect -->
        <filter id="coinBevel">
            <!-- Drop shadow for depth -->
            <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.9" />
            <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000" flood-opacity="0.5" />
        </filter>

        <!-- Text Mask for Shine -->
        <clipPath id="textClip">
            <g transform="translate(600, 160)" text-anchor="middle">
                <text font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="110" letter-spacing="12">WISEXPENSE</text>
            </g>
        </clipPath>
    </defs>

    <!-- Background -->
    <rect width="1200" height="250" fill="url(#bgGrad)" />

    <!-- decorative elements in background -->
    <circle cx="200" cy="50" r="150" fill="#FFD166" opacity="0.03" />
    <circle cx="1000" cy="200" r="200" fill="#FFD166" opacity="0.03" />
    
    <g transform="scale(3) translate(100, 40)" opacity="0.05">
      <circle cx="0" cy="0" r="40" fill="none" stroke="#FFD166" stroke-width="1.5" stroke-dasharray="4" />
      <circle cx="0" cy="0" r="30" fill="none" stroke="#FFD166" stroke-width="0.5" />
    </g>

    <g transform="scale(2) translate(450, 80)" opacity="0.05">
      <circle cx="0" cy="0" r="40" fill="none" stroke="#FFD166" stroke-width="1.5" stroke-dasharray="4" />
      <circle cx="0" cy="0" r="30" fill="none" stroke="#FFD166" stroke-width="0.5" />
    </g>

    <!-- Coin Stack Base (3D effect) -->
    <g transform="translate(600, 160)" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="110" letter-spacing="12">
        <text y="8" fill="#3B2600">WISEXPENSE</text>
        <text y="6" fill="#5C4300">WISEXPENSE</text>
        <text y="4" fill="#7A5900">WISEXPENSE</text>
        <text y="2" fill="#996F00">WISEXPENSE</text>
    </g>

    <!-- Main Text -->
    <g transform="translate(600, 160)" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="110" letter-spacing="12" filter="url(#coinBevel)">
        <text fill="url(#goldGrad)" stroke="#FFE066" stroke-width="1.5">WISEXPENSE</text>
    </g>

    <!-- Shine Rect Animation inside ClipPath -->
    <g clip-path="url(#textClip)">
        <rect x="-800" y="-50" width="800" height="400" fill="url(#shineGrad)" transform="skewX(-25)">
            <animate attributeName="x" from="-1400" to="2000" dur="3.5s" repeatCount="indefinite" />
        </rect>
    </g>
</svg>
